<!DOCTYPE html>
<html>
<head>
    <title>Test System Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow: auto; }
    </style>
</head>
<body>
    <h1>System Monitor Connection Test</h1>
    
    <div id="status" class="status offline">
        Status: Testing connection...
    </div>
    
    <button onclick="testConnection()">Test Connection</button>
    <button onclick="fetchData()">Fetch Data</button>
    
    <div id="result" style="margin-top: 20px;"></div>
    
    <script>
        async function testConnection() {
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            status.className = 'status';
            status.textContent = 'Status: Testing...';
            result.innerHTML = '';
            
            try {
                console.log('Testing connection to: http://localhost:8080/api/system');
                
                const response = await fetch('http://localhost:8080/api/system', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });
                
                console.log('Response status:', response.status, response.statusText);
                console.log('Response headers:', [...response.headers.entries()]);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Data received:', data);
                    
                    status.className = 'status online';
                    status.textContent = `Status: Connected! HTTP ${response.status}`;
                    
                    result.innerHTML = `
                        <h3>Success! Data received:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                console.error('Connection failed:', error);
                
                status.className = 'status offline';
                status.textContent = `Status: Error - ${error.message}`;
                
                result.innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.stack || error.message}</pre>
                    <p>Check browser console for details.</p>
                `;
            }
        }
        
        async function fetchData() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Fetching data...</p>';
            
            try {
                const response = await fetch('http://localhost:8080/api/system');
                const data = await response.json();
                
                result.innerHTML = `
                    <h3>System Data:</h3>
                    <p>CPU Usage: ${data.cpu.usage.toFixed(1)}%</p>
                    <p>Memory Usage: ${data.memory.percentage.toFixed(1)}%</p>
                    <p>Processes: ${data.processes.length}</p>
                    <button onclick="showFullData()">Show Full JSON</button>
                    <div id="fullData" style="display:none;">
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        function showFullData() {
            document.getElementById('fullData').style.display = 'block';
        }
        
        // Test connection on page load
        document.addEventListener('DOMContentLoaded', testConnection);
    </script>
</body>
</html>
